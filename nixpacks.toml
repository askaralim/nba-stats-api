# Puppeteer: the Node provider adds many apt debs (often 10+ min on slow Ubuntu mirrors).
# Use an empty apt list so Nixpacks does not emit `apt-get install` at all, and add
# Chromium from nixpkgs instead (binary cache is usually much faster than apt).
# See: https://github.com/railwayapp/nixpacks/blob/main/src/nixpacks/builder/docker/dockerfile_generation.rs
[phases.setup]
nixPkgs = ["...", "chromium"]
aptPkgs = []

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PUPPETEER_EXECUTABLE_PATH = "/root/.nix-profile/bin/chromium"
